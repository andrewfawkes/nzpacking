<!DOCTYPE html>

<head>

<title>NZ Trip Packing — Fawkes Family</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #083050;
    --green: #39B54A;
    --light: #f4f7fb;
    --mid: #e0e8f0;
    --text: #1a2a3a;
    --muted: #6b8299;
    --danger: #c0392b;
    --white: #ffffff;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(8,48,80,0.10);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 50px;
  }

  /* HEADER */
  header {
    background: var(--blue);
    color: var(--white);
    padding: 16px 18px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 14px rgba(8,48,80,0.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .header-accent { color: var(--green); }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.45); }

  /* COUNTDOWN */
  .countdown-strip {
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .countdown-label { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .countdown-units { display: flex; gap: 8px; align-items: center; }
  .countdown-unit { text-align: center; }
  .countdown-num { font-size: 24px; font-weight: 800; line-height: 1; color: var(--green); letter-spacing: -1px; }
  .countdown-unit-label { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 2px; }
  .countdown-sep { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.2); padding-bottom: 6px; }
  .countdown-depart { text-align: right; }
  .countdown-depart-date { font-size: 12px; font-weight: 700; color: var(--white); }
  .countdown-depart-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; }

  /* PERSON TABS */
  .person-tabs {
    display: flex;
    gap: 0;
    margin: 0 -18px;
  }
  .person-tab {
    flex: 1;
    padding: 10px 4px 12px;
    text-align: center;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .person-tab .tab-avatar { font-size: 20px; margin-bottom: 3px; }
  .person-tab .tab-name { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: 0.3px; text-transform: uppercase; }
  .person-tab .tab-prog { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .person-tab.active { border-bottom-color: var(--green); }
  .person-tab.active .tab-name { color: var(--white); }
  .person-tab.active .tab-prog { color: rgba(255,255,255,0.55); }

  /* PROGRESS */
  .progress-wrap { padding: 10px 18px 14px; background: var(--blue); }
  .progress-bar-bg { background: rgba(255,255,255,0.15); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
  .progress-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 5px; text-align: right; }

  /* CONTENT */
  .container { max-width: 600px; margin: 0 auto; padding: 14px 14px; }
  .person-pane { display: none; }
  .person-pane.active { display: block; }

  .warning-banner {
    background: #fff3cd; border-left: 4px solid #f0a500; border-radius: var(--radius);
    padding: 10px 13px; font-size: 13px; color: #7a5a00; margin-bottom: 12px;
    display: none; align-items: flex-start; gap: 8px; line-height: 1.4;
  }
  .warning-banner.show { display: flex; }

  /* CATEGORIES */
  .category-block { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .category-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--blue); cursor: pointer;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .category-header-left { display: flex; align-items: center; gap: 8px; }
  .cat-icon { font-size: 17px; }
  .cat-name { font-size: 13px; font-weight: 700; color: var(--white); letter-spacing: 0.4px; text-transform: uppercase; }
  .cat-badge { font-size: 11px; background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.85); border-radius: 99px; padding: 2px 8px; }
  .cat-badge.complete { background: var(--green); color: #fff; }
  .cat-chevron { font-size: 11px; color: rgba(255,255,255,0.5); transition: transform 0.2s; }
  .cat-chevron.open { transform: rotate(180deg); }
  .category-items { padding: 2px 0; }

  .item-row {
    display: flex; align-items: center; padding: 10px 14px;
    border-bottom: 1px solid var(--mid); gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .item-row:last-child { border-bottom: none; }

  .item-check {
    width: 22px; height: 22px; min-width: 22px; border-radius: 6px;
    border: 2px solid var(--mid); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; background: var(--white);
    -webkit-tap-highlight-color: transparent;
  }
  .item-check.checked { background: var(--green); border-color: var(--green); }
  .item-check.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }

  .item-label { flex: 1; font-size: 15px; color: var(--text); cursor: pointer; line-height: 1.3; min-width: 0; word-break: break-word; }
  .item-label.checked { text-decoration: line-through; opacity: 0.38; }

  .item-edit-input {
    flex: 1; font-size: 15px; color: var(--text); border: 1.5px solid var(--green);
    border-radius: 7px; padding: 5px 8px; background: #f0faf1; outline: none;
    min-width: 0; -webkit-appearance: none;
  }

  .item-btn {
    background: none; border: none; font-size: 15px; cursor: pointer;
    padding: 3px 3px; color: var(--muted); -webkit-tap-highlight-color: transparent;
    line-height: 1; transition: color 0.15s; flex-shrink: 0;
  }
  .item-btn.save { color: var(--green); font-size: 17px; }
  .item-btn.delete { color: #ccc; font-size: 20px; }
  .item-btn.delete:active { color: var(--danger); }

  .item-critical {
    font-size: 10px; background: #fff0f0; color: #c0392b; border-radius: 99px;
    padding: 2px 7px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }

  .add-item-row { display: flex; padding: 9px 12px; gap: 8px; border-top: 1px solid var(--mid); background: var(--light); }
  .add-item-input {
    flex: 1; border: 1.5px solid var(--mid); border-radius: 8px; padding: 8px 12px;
    font-size: 14px; background: var(--white); color: var(--text); outline: none; -webkit-appearance: none;
  }
  .add-item-input:focus { border-color: var(--green); }
  .add-item-btn {
    background: var(--green); color: white; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  .add-item-btn:active { opacity: 0.85; }

  .all-done { text-align: center; padding: 20px; color: var(--green); font-weight: 700; font-size: 16px; display: none; }
  .all-done.show { display: block; }

  .reset-btn {
    display: block; width: 100%; background: transparent; border: 1.5px solid var(--mid);
    color: var(--muted); border-radius: var(--radius); padding: 11px; font-size: 13px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; margin-top: 4px;
  }
  .reset-btn:active { background: var(--mid); }
</style>

<script>
const DEPART = new Date('2025-07-08T19:50:00+08:00');

function updateCountdown() {
  const diff = DEPART - new Date();
  if (diff <= 0) {
    ['cdDays','cdHours','cdMins','cdSecs'].forEach(id => document.getElementById(id).textContent = '00');
    return;
  }
  const s = Math.floor(diff/1000);
  document.getElementById('cdDays').textContent  = String(Math.floor(s/86400)).padStart(2,'0');
  document.getElementById('cdHours').textContent = String(Math.floor((s%86400)/3600)).padStart(2,'0');
  document.getElementById('cdMins').textContent  = String(Math.floor((s%3600)/60)).padStart(2,'0');
  document.getElementById('cdSecs').textContent  = String(s%60).padStart(2,'0');
}
updateCountdown();

const STORAGE_KEY = 'nz_family_packing_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
}

let allData = loadData();
let activePerson = 'andrew';
let editingId = null;

function genId() { return 'x' + Date.now() + Math.floor(Math.random()*9999); }

function personData() { return allData[activePerson]; }

function totalFor(person) { return allData[person].reduce((s,c)=>s+c.items.length,0); }
function doneFor(person) { return allData[person].reduce((s,c)=>s+c.items.filter(i=>i.checked).length,0); }

function switchPerson(p) {
  editingId = null;
  activePerson = p;
  document.querySelectorAll('.person-tab').forEach(t => t.classList.toggle('active', t.dataset.person === p));
  document.querySelectorAll('.person-pane').forEach(pane => pane.classList.toggle('active', pane.id === 'pane_' + p));
  renderAll();
}

function updateTabBadges() {
  ['andrew','astrid','milani'].forEach(p => {
    const el = document.getElementById('prog_' + p);
    if (el) el.textContent = doneFor(p) + '/' + totalFor(p);
  });
}

function updateProgress() {
  const data = personData();
  const total = data.reduce((s,c)=>s+c.items.length,0);
  const done = data.reduce((s,c)=>s+c.items.filter(i=>i.checked).length,0);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} packed`;
  document.getElementById('allDone').classList.toggle('show', total > 0 && done === total);

  const uncritical = data.flatMap(c=>c.items.filter(i=>i.critical && !i.checked));
  const banner = document.getElementById('warningBanner');
  if (uncritical.length > 0) {
    document.getElementById('warningText').textContent =
      `${uncritical.length} critical item${uncritical.length>1?'s':''} not packed: ${uncritical.map(i=>i.label.split(' (')[0].split(' —')[0]).join(', ')}`;
    banner.classList.add('show');
  } else { banner.classList.remove('show'); }

  updateTabBadges();
}

function toggleItem(catId, itemId) {
  if (editingId === itemId) return;
  const cat = personData().find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item.checked = !item.checked;
  saveData(allData);
  renderAll();
}

function deleteItem(catId, itemId) {
  const cat = personData().find(c=>c.id===catId);
  cat.items = cat.items.filter(i=>i.id!==itemId);
  editingId = null;
  saveData(allData);
  renderAll();
}

function startEdit(itemId) {
  editingId = itemId;
  renderAll();
  const inp = document.getElementById('edit_' + itemId);
  if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function saveEdit(catId, itemId) {
  const inp = document.getElementById('edit_' + itemId);
  if (!inp) return;
  const val = inp.value.trim();
  if (val) {
    const cat = personData().find(c=>c.id===catId);
    const item = cat.items.find(i=>i.id===itemId);
    item.label = val;
    saveData(allData);
  }
  editingId = null;
  renderAll();
}

function addItem(catId, label) {
  if (!label.trim()) return;
  const cat = personData().find(c=>c.id===catId);
  cat.items.push({ id: genId(), label: label.trim(), checked: false });
  saveData(allData);
  renderAll();
}

function toggleCategory(catId) {
  editingId = null;
  const cat = personData().find(c=>c.id===catId);
  cat.open = !cat.open;
  saveData(allData);
  renderAll();
}

function resetChecks() {
  if (!confirm('Reset all checkboxes for this person?')) return;
  personData().forEach(c=>c.items.forEach(i=>i.checked=false));
  saveData(allData);
  renderAll();
}

function renderAll() {
  const pane = document.getElementById('pane_' + activePerson);
  pane.innerHTML = '';

  personData().forEach(cat => {
    const total = cat.items.length;
    const done = cat.items.filter(i=>i.checked).length;
    const complete = total > 0 && done === total;

    const block = document.createElement('div');
    block.className = 'category-block';

    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.innerHTML = `
      <div class="category-header-left">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-badge${complete?' complete':''}">${done}/${total}</span>
      </div>
      <span class="cat-chevron${cat.open?' open':''}">▼</span>`;
    hdr.addEventListener('click', ()=>toggleCategory(cat.id));
    block.appendChild(hdr);

    if (cat.open) {
      const itemsWrap = document.createElement('div');
      itemsWrap.className = 'category-items';

      cat.items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row';
        const isEditing = editingId === item.id;

        const chk = document.createElement('div');
        chk.className = 'item-check' + (item.checked?' checked':'');
        chk.addEventListener('click', ()=>toggleItem(cat.id, item.id));
        row.appendChild(chk);

        if (isEditing) {
          const inp = document.createElement('input');
          inp.type = 'text'; inp.id = 'edit_' + item.id;
          inp.className = 'item-edit-input'; inp.value = item.label;
          inp.addEventListener('keydown', e=>{
            if (e.key==='Enter') saveEdit(cat.id,item.id);
            if (e.key==='Escape') { editingId=null; renderAll(); }
          });
          row.appendChild(inp);
          const saveBtn = document.createElement('button');
          saveBtn.className = 'item-btn save'; saveBtn.textContent = '✓';
          saveBtn.addEventListener('click', ()=>saveEdit(cat.id,item.id));
          row.appendChild(saveBtn);
        } else {
          const lbl = document.createElement('div');
          lbl.className = 'item-label'+(item.checked?' checked':'');
          lbl.textContent = item.label;
          lbl.addEventListener('click', ()=>toggleItem(cat.id,item.id));
          row.appendChild(lbl);

          if (item.critical && !item.checked) {
            const badge = document.createElement('span');
            badge.className = 'item-critical'; badge.textContent = 'critical';
            row.appendChild(badge);
          }

          const editBtn = document.createElement('button');
          editBtn.className = 'item-btn'; editBtn.textContent = '✏️';
          editBtn.addEventListener('click', e=>{ e.stopPropagation(); startEdit(item.id); });
          row.appendChild(editBtn);
        }

        const del = document.createElement('button');
        del.className = 'item-btn delete'; del.textContent = '×';
        del.addEventListener('click', ()=>deleteItem(cat.id,item.id));
        row.appendChild(del);

        itemsWrap.appendChild(row);
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-item-row';
      const input = document.createElement('input');
      input.className = 'add-item-input'; input.placeholder = 'Add item...'; input.type = 'text';
      input.addEventListener('keydown', e=>{
        if (e.key==='Enter') { addItem(cat.id,input.value); input.value=''; }
      });
      const btn = document.createElement('button');
      btn.className = 'add-item-btn'; btn.textContent = '+ Add';
      btn.addEventListener('click', ()=>{ addItem(cat.id,input.value); input.value=''; });
      addRow.appendChild(input); addRow.appendChild(btn);
      itemsWrap.appendChild(addRow);
      block.appendChild(itemsWrap);
    }

    pane.appendChild(block);
  });

  updateProgress();
}

renderAll();
updateTabBadges();
</script>
